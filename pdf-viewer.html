<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer — OpenDict</title>
  <link rel="stylesheet" href="pdf-viewer.css">
  <link rel="stylesheet" href="content.css">
</head>
<body>
  <div id="toolbar">
    <div id="toolbar-left">
      <button id="toggle-sidebar" title="Toggle sidebar">&#9776;</button>
      <span id="filename"></span>
    </div>
    <div id="toolbar-controls">
      <button id="prev-page" title="Previous page">&#9664;</button>
      <span id="page-info">
        <input id="page-num" type="text" inputmode="numeric" value="1">
        / <span id="page-count">-</span>
      </span>
      <button id="next-page" title="Next page">&#9654;</button>
      <span class="separator"></span>
      <button id="zoom-out" title="Zoom out">&minus;</button>
      <span id="zoom-level">150%</span>
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-reset" title="Reset zoom">Reset</button>
      <span class="separator"></span>
      <button id="toggle-eye-care" title="Eye care mode">&#9788;</button>
      <button id="toggle-search" title="Find (Ctrl+F)">&#128269;</button>
    </div>
  </div>
  <div id="search-bar" hidden>
    <input id="search-input" type="text" placeholder="Find in document" autocomplete="off" spellcheck="false" />
    <span id="search-count">0/0</span>
    <button id="search-prev" title="Previous match (Shift+Enter)">&#9650;</button>
    <button id="search-next" title="Next match (Enter)">&#9660;</button>
    <button id="search-close" title="Close (Esc)">&#10005;</button>
  </div>
  <div id="main-content">
    <div id="sidebar">
      <div id="sidebar-header">Outline</div>
      <div id="sidebar-content"></div>
    </div>
    <div id="viewer-container"></div>
  </div>
  <script src="content.js"></script>
  <script type="module" src="pdf-viewer.js"></script>
</body>
</html>
